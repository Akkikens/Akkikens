name: GitHub Metrics
on:
  schedule: [{ cron: "25 3 * * *" }]   # daily @ 03:25 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Base metrics (header + activity + community) ───
  base:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Akkikens
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Los_Angeles
          output_action: commit
          committer_message: "chore: update metrics"
          filename: metrics.svg

  # ─── Isometric contribution calendar ───
  isocalendar:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Akkikens
          template: classic
          base: ""
          config_timezone: America/Los_Angeles
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: commit
          committer_message: "chore: update isocalendar"
          filename: metrics-isocalendar.svg

  # ─── Contribution habits (commits per hour/day, languages, facts) ───
  habits:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Akkikens
          template: classic
          base: ""
          config_timezone: America/Los_Angeles
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: no
          output_action: commit
          committer_message: "chore: update habits"
          filename: metrics-habits.svg

  # ─── Pull requests & code reviews ───
  followup-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Akkikens
          template: classic
          base: ""
          config_timezone: America/Los_Angeles
          plugin_followup: yes
          plugin_followup_sections: user, repositories
          plugin_followup_indepth: yes
          plugin_reviewers: yes
          plugin_reviewers_charts_type: graph
          output_action: commit
          committer_message: "chore: update followup & reviews"
          filename: metrics-followup.svg

  # ─── Notable contributions & achievements ───
  achievements:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Akkikens
          template: classic
          base: ""
          config_timezone: America/Los_Angeles
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_display: compact
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit
          output_action: commit
          committer_message: "chore: update achievements"
          filename: metrics-achievements.svg
